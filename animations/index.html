<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beverage Trends: CAGR vs Engagement (2025-2028)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
            min-height: 100vh;
            color: #1e293b;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 30px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 400;
        }

        .visualization-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.05);
            color: #475569;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.04);
            padding: 8px 18px;
            border-radius: 50px;
        }

        .speed-control label {
            font-size: 0.85rem;
            color: #64748b;
        }

        .speed-slider {
            -webkit-appearance: none;
            width: 100px;
            height: 5px;
            border-radius: 3px;
            background: rgba(0, 0, 0, 0.1);
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
        }

        .year-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.04);
            padding: 8px 20px;
            border-radius: 50px;
        }

        .year-indicator span {
            font-size: 0.85rem;
            color: #64748b;
        }

        .year-indicator .year {
            font-size: 1.3rem;
            font-weight: 700;
            color: #667eea;
            min-width: 55px;
        }

        .label-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.04);
            padding: 8px 18px;
            border-radius: 50px;
        }

        .label-toggle label {
            font-size: 0.85rem;
            color: #64748b;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.15);
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #94a3b8;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(20px);
            background-color: white;
        }

        .chart-container {
            position: relative;
            overflow: hidden;
            padding-bottom: 20px;
        }

        svg {
            display: block;
            margin: 0 auto;
        }

        .quadrant-label {
            font-size: 11px;
            font-weight: 600;
            fill: rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .axis-label {
            font-size: 12px;
            font-weight: 500;
            fill: #475569;
        }

        .axis line, .axis path {
            stroke: rgba(0, 0, 0, 0.15);
        }

        .axis text {
            fill: #64748b;
            font-size: 10px;
        }

        .grid line {
            stroke: rgba(0, 0, 0, 0.08);
            stroke-dasharray: 3, 3;
        }

        .trend-label {
            font-size: 11px;
            fill: rgba(0, 0, 0, 0.8);
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.95), 0 0 6px rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(102, 126, 234, 0.25);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 0.8rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            max-width: 260px;
            z-index: 1000;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding-bottom: 8px;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            gap: 15px;
        }

        .tooltip-label {
            color: #64748b;
        }

        .tooltip-value {
            font-weight: 500;
            color: #334155;
        }

        .tooltip-change {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .tooltip-change.positive {
            color: #10b981;
        }

        .tooltip-change.negative {
            color: #ef4444;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #64748b;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-line {
            width: 25px;
            height: 2px;
            border-radius: 1px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            margin-top: 18px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .bubble-glow {
            filter: drop-shadow(0 0 8px rgba(102, 126, 234, 0.6));
        }

        .quadrant {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quadrant:hover {
            filter: brightness(0.92);
            stroke: rgba(102, 126, 234, 0.5);
            stroke-width: 2;
        }

        .btn-zoom {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            display: none;
        }

        .btn-zoom.visible {
            display: flex;
        }

        .btn-zoom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.6);
        }

        .zoom-hint {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 8px;
            font-style: italic;
        }

        .zoom-hint.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Beverage Market Trends</h1>
            <p class="subtitle">CAGR vs Engagement Matrix — Watch 81 beverage categories drift from 2025 to 2028</p>
        </header>

        <div class="visualization-container">
            <div class="controls">
                <button class="btn btn-primary" id="playBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    Play
                </button>
                <button class="btn btn-secondary" id="resetBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    Reset
                </button>
                <div class="speed-control">
                    <label>Speed:</label>
                    <input type="range" class="speed-slider" id="speedSlider" min="0.5" max="3" step="0.5" value="1">
                    <span id="speedValue">1x</span>
                </div>
                <div class="year-indicator">
                    <span>Year:</span>
                    <span class="year" id="currentYear">2025</span>
                </div>
                <div class="label-toggle">
                    <label>Labels:</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="labelToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button class="btn btn-zoom" id="zoomOutBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                        <path d="M8 11h6"/>
                    </svg>
                    Zoom Out
                </button>
            </div>
            <p class="zoom-hint" id="zoomHint">Click on any quadrant to zoom in</p>

            <div class="chart-container">
                <div id="chart"></div>
                <div class="tooltip" id="tooltip"></div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background: linear-gradient(135deg, #667eea, #764ba2);"></div>
                    <span>Beverage Category</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: linear-gradient(90deg, rgba(102, 126, 234, 0.6), rgba(118, 75, 162, 0.2));"></div>
                    <span>Movement Trail</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #10b981;"></div>
                    <span>Engagement Increase</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #ef4444;"></div>
                    <span>Engagement Decrease</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const rawData = `Subcategory,Engagement 2025,CAGR 2025,Engagement 2028,CAGR 2028
100% fruit juice,359.64,109.00%,231.221,9.0%
Aam Panna,106.29,-7.00%,138.3349,76.0%

Fresh coconut water,172.58,17.00%,348.3445,67.7%
Fruit nectar,2.79,37.00%,1.976899,15.0%
Ginger ale,291.95,437.20%,476.7991,157.0%
Glow Juices (Skin Health focused),455.45,168.00%,165.77825,-15.3%
Green tea,116.56,34.59%,365.8457,145.1%
Hangover Recovery Drinks,3.20,12.40%,24.53,2.0%
Herbal Iced Tea,1.02,193.00%,27.99877,135.0%
Herbal juice drinks,197.06,79.00%,106.4973,24.0%
Herbal Kadha,39.09,124.00%,270.1272,96.2%
Herbal tea,83.80,75.00%,92.93168,11.4%
Hot chocolate (milk),58.19,104.30%,454.6354,74.3%
Iced tea,5.93,94.30%,247.3262,166.0%
Infused water,344.95,188.00%,40.09295,26.1%
Instant coffee,93.62,28.00%,460.2266,43.4%
Jaljeera,18.10,32.32%,91.53,72.4%
Juice concentrates,29.15,293.00%,34.58148,89.2%
Juice shots,181.01,183.00%,322.7127,14.0%
Kanji,169.41,122.00%,114.2,41.8%
Kashmiri Kahwa,11.19,26.00%,59.9212,30.4%
Lavender Tea,0.19,12.00%,128.3391,106.0%
Lemon/lime soda,849.20,165.00%,232.49,27.4%
Loose leaf tea,5.50,123.20%,128.8789,161.2%
Malted milk drinks,35.46,9.00%,105.4049,65.7%
Milk tea,310.59,81.00%,173.4454,-3.4%
Milk-based probiotic drinks,45.10,26.00%,23.50825,10.0%
Milkshake,975.24,17.00%,488.394,-12.0%
Mixed vegetable blends,182.04,277.94%,250.3434,-20.0%
Natural energy drinks,173.75,118.00%,59.63316,76.0%
Nimbu Paani,209.45,65.30%,424.567,32.5%

Oat milk coffee,3.28,59.00%,1.9501727,13.0%
Orange soda,278.53,15.00%,132.984938,-24.0%
ORS drinks,90.24,62.00%,306.61273,58.2%
Packaged coconut water,56.30,177.20%,415.2883,145.0%
Panakam,97.18,170.00%,130.4979,11.4%
Plant protein drinks,2.09,-50.00%,0.5334716,-17.0%
Pre-workout RTD drinks,25.47,162.20%,343.0587,182.3%
Preworkout Energy shot,11.34,372.20%,26.28893,173.3%
Protein milkshake,444.19,347.50%,250.0994,-20.0%
Protein Water RTD,25.20,49.80%,78.358588,121.0%
Ragi malt drink,68.05,27.00%,116.7647,-20.0%
Ready-to-drink coffee,21.82,33.30%,60.0872,67.0%
Salted lassi,17.92,50.00%,98.2,113.0%
Sattu drink,119.56,-27.00%,82.77,23.0%
Sherbets,305.71,45.00%,120.7933,13.7%
Smoothie-style fruit juices,458.33,121.00%,37.75848,-2.0%
Soy milk beverages,2.53,45.00%,76.73489,93.0%
Sparkling flavored water,432.99,482.00%,112.40208,49.6%
Sports hydration drinks,150.70,40.00%,327.4513,82.0%
Sugar-free energy drinks,73.20,124.00%,421.2951,156.0%
Sugarcane juice,626.70,33.00%,111.8726,13.0%
Sweet lassi,105.27,25.00%,141.1859,39.0%
Thandai,206.64,154.00%,219.3,21.2%
Thickshake,43.43,31.00%,70.20185,82.0%
Turmeric Tea,10.67,6.60%,16.819,2.0%
Vitamin water,152.20,77.20%,36.06734,5.6%
Wheatgrass juice,34.26,20.00%,112.7959,33.0%
Yogurt drink,71.19,-23.00%,90.67409,24.0%`;

        const data = d3.csvParse(rawData, d => ({
            name: d.Subcategory,
            eng2025: parseFloat(d['Engagement 2025'].replace(',', '')),
            cagr2025: parseFloat(d['CAGR 2025'].replace('%', '')),
            eng2028: parseFloat(d['Engagement 2028'].replace(',', '')),
            cagr2028: parseFloat(d['CAGR 2028'].replace('%', ''))
        }));

        const margin = { top: 50, right: 60, bottom: 100, left: 90 };
        const width = 1450 - margin.left - margin.right;
        const height = 800 - margin.top - margin.bottom;

        const svg = d3.select('#chart')
            .append('svg')
            .attr('width', width + margin.left + margin.right)
            .attr('height', height + margin.top + margin.bottom)
            .append('g')
            .attr('transform', `translate(${margin.left},${margin.top})`);

        const allEngagement = [...data.map(d => d.eng2025), ...data.map(d => d.eng2028)];
        const allCagr = [...data.map(d => d.cagr2025), ...data.map(d => d.cagr2028)];

        // X-axis: CAGR (horizontal)
        const xScale = d3.scaleLinear()
            .domain([d3.min(allCagr) - 20, d3.max(allCagr) + 50])
            .range([0, width]);

        // Y-axis: Engagement (vertical) - linear scale
        // Add negative buffer at bottom for dense data concentration
        const yScale = d3.scaleLinear()
            .domain([-50, d3.max(allEngagement) * 1.1])
            .range([height, 0]);

        const medianEng = d3.median(allEngagement);
        const medianCagr = d3.median(allCagr);

        // Quadrants based on CAGR (x) and Engagement (y)
        // Top-Right: High Engagement, High CAGR = STARS
        // Top-Left: High Engagement, Low CAGR = MATURE/CASH COWS
        // Bottom-Right: Low Engagement, High CAGR = EMERGING
        // Bottom-Left: Low Engagement, Low CAGR = DECLINING
        const quadrantColors = [
            { x: 0, y: 0, w: xScale(medianCagr), h: yScale(medianEng), color: 'rgba(251, 191, 36, 0.15)', label: 'Mature' },
            { x: xScale(medianCagr), y: 0, w: width - xScale(medianCagr), h: yScale(medianEng), color: 'rgba(16, 185, 129, 0.12)', label: 'Stars' },
            { x: 0, y: yScale(medianEng), w: xScale(medianCagr), h: height - yScale(medianEng), color: 'rgba(148, 163, 184, 0.15)', label: 'Declining' },
            { x: xScale(medianCagr), y: yScale(medianEng), w: width - xScale(medianCagr), h: height - yScale(medianEng), color: 'rgba(59, 130, 246, 0.12)', label: 'Emerging' }
        ];

        svg.selectAll('.quadrant')
            .data(quadrantColors)
            .enter()
            .append('rect')
            .attr('class', 'quadrant')
            .attr('x', d => d.x)
            .attr('y', d => d.y)
            .attr('width', d => d.w)
            .attr('height', d => d.h)
            .attr('fill', d => d.color);

        // Vertical median line (CAGR)
        const verticalLine = svg.append('line')
            .attr('class', 'median-line')
            .attr('x1', xScale(medianCagr))
            .attr('x2', xScale(medianCagr))
            .attr('y1', 0)
            .attr('y2', height)
            .attr('stroke', 'rgba(0, 0, 0, 0.15)')
            .attr('stroke-width', 1);

        // Horizontal median line (Engagement)
        const horizontalLine = svg.append('line')
            .attr('class', 'median-line')
            .attr('x1', 0)
            .attr('x2', width)
            .attr('y1', yScale(medianEng))
            .attr('y2', yScale(medianEng))
            .attr('stroke', 'rgba(0, 0, 0, 0.15)')
            .attr('stroke-width', 1);

        // Quadrant labels
        const quadrantLabels = [
            { x: xScale(medianCagr) / 2, y: 30, text: 'MATURE' },
            { x: xScale(medianCagr) + (width - xScale(medianCagr)) / 2, y: 30, text: 'STARS' },
            { x: xScale(medianCagr) / 2, y: height - 15, text: 'DECLINING' },
            { x: xScale(medianCagr) + (width - xScale(medianCagr)) / 2, y: height - 15, text: 'EMERGING' }
        ];

        svg.selectAll('.quadrant-label')
            .data(quadrantLabels)
            .enter()
            .append('text')
            .attr('class', 'quadrant-label')
            .attr('x', d => d.x)
            .attr('y', d => d.y)
            .attr('text-anchor', 'middle')
            .text(d => d.text);

        // X-axis (CAGR)
        const xAxis = d3.axisBottom(xScale)
            .ticks(15)
            .tickFormat(d => d + '%');

        // Y-axis (Engagement)
        const yAxis = d3.axisLeft(yScale)
            .ticks(10)
            .tickFormat(d => d3.format('.0f')(d));

        svg.append('g')
            .attr('class', 'axis x-axis')
            .attr('transform', `translate(0,${height})`)
            .call(xAxis);

        svg.append('g')
            .attr('class', 'axis y-axis')
            .call(yAxis);

        // Axis labels
        svg.append('text')
            .attr('class', 'axis-label')
            .attr('x', width / 2)
            .attr('y', height + 65)
            .attr('text-anchor', 'middle')
            .text('CAGR (%)');

        svg.append('text')
            .attr('class', 'axis-label')
            .attr('transform', 'rotate(-90)')
            .attr('x', -height / 2)
            .attr('y', -65)
            .attr('text-anchor', 'middle')
            .text('Engagement Score');

        const defs = svg.append('defs');

        // Add clip path to prevent overflow when zoomed
        defs.append('clipPath')
            .attr('id', 'chartClip')
            .append('rect')
            .attr('x', 0)
            .attr('y', 0)
            .attr('width', width)
            .attr('height', height);

        const bubbleGradient = defs.append('radialGradient')
            .attr('id', 'bubbleGradient')
            .attr('cx', '30%')
            .attr('cy', '30%');

        bubbleGradient.append('stop')
            .attr('offset', '0%')
            .attr('stop-color', '#a78bfa');

        bubbleGradient.append('stop')
            .attr('offset', '100%')
            .attr('stop-color', '#667eea');

        // Create a clipped group for all chart content
        const chartContent = svg.append('g')
            .attr('clip-path', 'url(#chartClip)');

        const trails = chartContent.append('g').attr('class', 'trails');
        const bubbles = chartContent.append('g').attr('class', 'bubbles');
        const labels = chartContent.append('g').attr('class', 'labels');

        const bubbleRadius = 8;

        // Color based on engagement change
        const colorScale = d => {
            const engChange = d.eng2028 - d.eng2025;
            if (engChange > 100) return '#10b981';
            if (engChange > 0) return '#34d399';
            if (engChange > -100) return '#f59e0b';
            return '#ef4444';
        };

        // Create trails
        data.forEach((d, i) => {
            const x1 = xScale(d.cagr2025);
            const y1 = yScale(d.eng2025);
            const x2 = xScale(d.cagr2028);
            const y2 = yScale(d.eng2028);

            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2 - 15;

            trails.append('path')
                .attr('class', 'trail')
                .attr('d', `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`)
                .attr('fill', 'none')
                .attr('stroke', colorScale(d))
                .attr('stroke-width', 2)
                .attr('stroke-opacity', 0)
                .attr('stroke-linecap', 'round')
                .attr('data-index', i);

            trails.append('circle')
                .attr('class', 'trail-end')
                .attr('cx', x2)
                .attr('cy', y2)
                .attr('r', 4)
                .attr('fill', colorScale(d))
                .attr('opacity', 0)
                .attr('data-index', i);
        });

        // Create bubble groups
        const bubbleGroups = bubbles.selectAll('.bubble-group')
            .data(data)
            .enter()
            .append('g')
            .attr('class', 'bubble-group')
            .attr('transform', d => `translate(${xScale(d.cagr2025)},${yScale(d.eng2025)})`);

        bubbleGroups.append('circle')
            .attr('class', 'bubble')
            .attr('r', bubbleRadius)
            .attr('fill', 'url(#bubbleGradient)')
            .attr('stroke', 'rgba(0, 0, 0, 0.2)')
            .attr('stroke-width', 1.5)
            .attr('opacity', 0.85)
            .style('cursor', 'pointer');

        // Truncate long names
        function truncateName(name, maxLen = 18) {
            if (name.length <= maxLen) return name;
            return name.substring(0, maxLen - 2) + '...';
        }

        // Create label groups
        const labelGroups = labels.selectAll('.label-group')
            .data(data)
            .enter()
            .append('g')
            .attr('class', 'label-group')
            .attr('transform', d => `translate(${xScale(d.cagr2025)},${yScale(d.eng2025)})`);

        labelGroups.append('text')
            .attr('class', 'trend-label')
            .attr('x', bubbleRadius + 5)
            .attr('y', 4)
            .text(d => truncateName(d.name));

        const tooltip = d3.select('#tooltip');

        bubbleGroups
            .on('mouseenter', function(event, d) {
                d3.select(this).select('.bubble')
                    .transition()
                    .duration(200)
                    .attr('stroke-width', 3)
                    .attr('stroke', '#1e293b');

                const engChange = ((d.eng2028 - d.eng2025) / d.eng2025 * 100).toFixed(1);
                const cagrChange = (d.cagr2028 - d.cagr2025).toFixed(1);
                const changeClass = parseFloat(engChange) >= 0 ? 'positive' : 'negative';

                tooltip.html(`
                    <div class="tooltip-title">${d.name}</div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">2025 Engagement:</span>
                        <span class="tooltip-value">${d.eng2025.toFixed(1)}</span>
                    </div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">2025 CAGR:</span>
                        <span class="tooltip-value">${d.cagr2025.toFixed(1)}%</span>
                    </div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">2028 Engagement:</span>
                        <span class="tooltip-value">${d.eng2028.toFixed(1)}</span>
                    </div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">2028 CAGR:</span>
                        <span class="tooltip-value">${d.cagr2028.toFixed(1)}%</span>
                    </div>
                    <div class="tooltip-change ${changeClass}">
                        Engagement Change: ${engChange >= 0 ? '+' : ''}${engChange}%
                    </div>
                `);

                const rect = event.target.getBoundingClientRect();
                const containerRect = document.querySelector('.chart-container').getBoundingClientRect();

                tooltip
                    .style('left', (rect.left - containerRect.left + 20) + 'px')
                    .style('top', (rect.top - containerRect.top - 10) + 'px')
                    .classed('visible', true);
            })
            .on('mouseleave', function() {
                d3.select(this).select('.bubble')
                    .transition()
                    .duration(200)
                    .attr('stroke-width', 1.5)
                    .attr('stroke', 'rgba(0, 0, 0, 0.2)');

                tooltip.classed('visible', false);
            });

        let isPlaying = false;
        let animationProgress = 0;
        let animationSpeed = 1;
        let animationFrame;
        const animationDuration = 4000;

        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const currentYear = document.getElementById('currentYear');
        const progressFill = document.getElementById('progressFill');
        const labelToggle = document.getElementById('labelToggle');

        // Label toggle functionality
        labelToggle.addEventListener('change', (e) => {
            labels.style('opacity', e.target.checked ? 1 : 0);
        });

        function updatePositions(progress) {
            const t = d3.easeCubicInOut(progress);

            bubbleGroups.each(function(d) {
                const x1 = xScale(d.cagr2025);
                const y1 = yScale(d.eng2025);
                const x2 = xScale(d.cagr2028);
                const y2 = yScale(d.eng2028);

                const currentX = x1 + (x2 - x1) * t;
                const currentY = y1 + (y2 - y1) * t;

                d3.select(this)
                    .attr('transform', `translate(${currentX},${currentY})`);
            });

            // Update label positions
            labelGroups.each(function(d) {
                const x1 = xScale(d.cagr2025);
                const y1 = yScale(d.eng2025);
                const x2 = xScale(d.cagr2028);
                const y2 = yScale(d.eng2028);

                const currentX = x1 + (x2 - x1) * t;
                const currentY = y1 + (y2 - y1) * t;

                d3.select(this)
                    .attr('transform', `translate(${currentX},${currentY})`);
            });

            trails.selectAll('.trail')
                .attr('stroke-opacity', d => Math.min(progress * 2, 0.6))
                .attr('stroke-dasharray', function() {
                    const length = this.getTotalLength();
                    return `${length * progress} ${length}`;
                });

            trails.selectAll('.trail-end')
                .attr('opacity', progress > 0.1 ? 0.8 : 0);

            const year = Math.floor(2025 + progress * 3);
            currentYear.textContent = year;
            progressFill.style.width = (progress * 100) + '%';
        }

        function animate(timestamp) {
            if (!isPlaying) return;

            animationProgress += (animationSpeed / animationDuration) * 16;

            if (animationProgress >= 1) {
                animationProgress = 1;
                isPlaying = false;
                playBtn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    Replay
                `;
            }

            updatePositions(animationProgress);

            if (isPlaying) {
                animationFrame = requestAnimationFrame(animate);
            }
        }

        playBtn.addEventListener('click', () => {
            if (animationProgress >= 1) {
                animationProgress = 0;
                updatePositions(0);
            }

            isPlaying = !isPlaying;

            if (isPlaying) {
                playBtn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                    Pause
                `;
                animationFrame = requestAnimationFrame(animate);
            } else {
                playBtn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    Play
                `;
                cancelAnimationFrame(animationFrame);
            }
        });

        resetBtn.addEventListener('click', () => {
            isPlaying = false;
            animationProgress = 0;
            cancelAnimationFrame(animationFrame);

            playBtn.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                Play
            `;

            updatePositions(0);

            trails.selectAll('.trail')
                .attr('stroke-opacity', 0)
                .attr('stroke-dasharray', 'none');

            trails.selectAll('.trail-end')
                .attr('opacity', 0);
        });

        speedSlider.addEventListener('input', (e) => {
            animationSpeed = parseFloat(e.target.value);
            speedValue.textContent = animationSpeed + 'x';
        });

        // Zoom functionality
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomHint = document.getElementById('zoomHint');
        let isZoomed = false;

        // Store original domains
        const originalXDomain = xScale.domain().slice();
        const originalYDomain = yScale.domain().slice();

        // Quadrant data bounds (in data coordinates, not pixels)
        // 0: Mature (low CAGR, high Engagement) - top-left
        // 1: Stars (high CAGR, high Engagement) - top-right  
        // 2: Declining (low CAGR, low Engagement) - bottom-left
        // 3: Emerging (high CAGR, low Engagement) - bottom-right
        function getQuadrantDataBounds(index) {
            const xMin = originalXDomain[0];
            const xMax = originalXDomain[1];
            const yMin = originalYDomain[0];
            const yMax = originalYDomain[1];
            
            switch(index) {
                case 0: // Mature: left half, top half
                    return { xMin: xMin, xMax: medianCagr, yMin: medianEng, yMax: yMax };
                case 1: // Stars: right half, top half
                    return { xMin: medianCagr, xMax: xMax, yMin: medianEng, yMax: yMax };
                case 2: // Declining: left half, bottom half
                    return { xMin: xMin, xMax: medianCagr, yMin: yMin, yMax: medianEng };
                case 3: // Emerging: right half, bottom half
                    return { xMin: medianCagr, xMax: xMax, yMin: yMin, yMax: medianEng };
            }
        }

        function redrawChart(duration = 500) {
            // Update axes
            svg.select('.x-axis').transition().duration(duration).call(xAxis);
            svg.select('.y-axis').transition().duration(duration).call(yAxis);

            // Update bubble positions based on current animation progress
            const t = d3.easeCubicInOut(animationProgress);
            
            bubbleGroups.transition().duration(duration)
                .attr('transform', d => {
                    const cagr = d.cagr2025 + (d.cagr2028 - d.cagr2025) * t;
                    const eng = d.eng2025 + (d.eng2028 - d.eng2025) * t;
                    return `translate(${xScale(cagr)},${yScale(eng)})`;
                });

            labelGroups.transition().duration(duration)
                .attr('transform', d => {
                    const cagr = d.cagr2025 + (d.cagr2028 - d.cagr2025) * t;
                    const eng = d.eng2025 + (d.eng2028 - d.eng2025) * t;
                    return `translate(${xScale(cagr)},${yScale(eng)})`;
                });

            // Update trails
            trails.selectAll('.trail').transition().duration(duration)
                .attr('d', (d, i) => {
                    const item = data[i];
                    const x1 = xScale(item.cagr2025);
                    const y1 = yScale(item.eng2025);
                    const x2 = xScale(item.cagr2028);
                    const y2 = yScale(item.eng2028);
                    const midX = (x1 + x2) / 2;
                    const midY = (y1 + y2) / 2 - 15;
                    return `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`;
                });

            trails.selectAll('.trail-end').transition().duration(duration)
                .attr('cx', (d, i) => xScale(data[i].cagr2028))
                .attr('cy', (d, i) => yScale(data[i].eng2028));
        }

        function zoomToQuadrant(index) {
            if (isZoomed) return;
            
            const bounds = getQuadrantDataBounds(index);
            
            // Add padding to the bounds (more at bottom for data concentration)
            const xRange = bounds.xMax - bounds.xMin;
            const yRange = bounds.yMax - bounds.yMin;
            const xPadding = xRange * 0.1;
            const yPaddingTop = yRange * 0.1;
            const yPaddingBottom = yRange * 0.15;
            
            // Set new scale domains with padding (more at bottom)
            xScale.domain([bounds.xMin - xPadding, bounds.xMax + xPadding]);
            yScale.domain([bounds.yMin - yPaddingBottom, bounds.yMax + yPaddingTop]);

            isZoomed = true;
            zoomOutBtn.classList.add('visible');
            zoomHint.classList.add('hidden');

            // Hide median lines
            svg.selectAll('.median-line').transition().duration(300).style('opacity', 0);
            
            // Hide quadrant backgrounds and labels
            svg.selectAll('.quadrant').transition().duration(300).style('opacity', 0);
            svg.selectAll('.quadrant-label').transition().duration(300).style('opacity', 0);

            redrawChart(500);
        }

        function zoomOut() {
            if (!isZoomed) return;

            // Restore original domains
            xScale.domain(originalXDomain);
            yScale.domain(originalYDomain);

            isZoomed = false;
            zoomOutBtn.classList.remove('visible');
            zoomHint.classList.remove('hidden');

            // Show median lines
            svg.selectAll('.median-line').transition().duration(300).style('opacity', 1);
            
            // Show quadrant backgrounds and labels
            svg.selectAll('.quadrant').transition().duration(300).style('opacity', 1);
            svg.selectAll('.quadrant-label').transition().duration(300).style('opacity', 1);

            redrawChart(500);
        }

        // Add click handlers to quadrants
        svg.selectAll('.quadrant')
            .on('click', function(event, d) {
                event.stopPropagation();
                const index = quadrantColors.indexOf(d);
                if (index >= 0) {
                    zoomToQuadrant(index);
                }
            });

        zoomOutBtn.addEventListener('click', zoomOut);

        updatePositions(0);
    </script>
</body>
</html>
